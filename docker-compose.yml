services:
  travelsphere:
    build: .
    container_name: travelsphere-app
    ports:
      - "8080:8080"
    environment:
      - RESTCOUNTRIES_BASE_URL=https://restcountries.com/v3.1
      - OPENTRIPMAP_BASE_URL=https://api.opentripmap.com/0.1/en
      - OPENTRIPMAP_API_KEY=${OPENTRIPMAP_API_KEY}
      - WEATHERAPI_BASE_URL=http://api.weatherapi.com/v1
      - WEATHERAPI_KEY=${WEATHERAPI_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    networks:
      - travelsphere-network

networks:
  travelsphere-network:
    driver: bridge